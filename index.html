<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <table id="DisplayBooks"> 
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Page Count</th>
            <th>Read status</th>
            <th></th>
        </tr>
    </table>

    <button type="button" id="showForm">Add New Book</button>

    <form action="" id="form">
        <div>
            <label for="author">Book's author</label>
            <input type="text" id="author" name="author" required>
        </div>
        <div>
            <label for="title">Book's title: </label>
            <input type="text" id="title" required name="title">
        </div>
        <div>
            <label for="pages">Page count: </label>
            <input type="text" id="pages" required name="pages">
        </div>
        <div>Have You Read The Book?</div>
        <div>
            <label for="true">Yes:</label>
            <input type="radio" name="read" value="true" checked>
            <label for="false">No:</label>
            <input type="radio" name="read" value="false">
        </div>
        <button>Submit</button>
    </form>

    <script src="object_constructors.js"></script>
    <!-- <script src="prototype_constructors.js"></script> -->
</body>
</html>
